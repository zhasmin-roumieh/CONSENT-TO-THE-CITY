<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a0a"/>

  <!-- City grid lines (subtle) -->
  <line x1="2" y1="12" x2="30" y2="12" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="2" y1="20" x2="30" y2="20" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="10" y1="2" x2="10" y2="30" stroke="#1e1e1e" stroke-width="1"/>
  <line x1="22" y1="2" x2="22" y2="30" stroke="#1e1e1e" stroke-width="1"/>

  <!-- City blocks (very subtle) -->
  <rect x="3" y="3" width="6" height="8" rx="0.5" fill="#111"/>
  <rect x="11" y="3" width="10" height="8" rx="0.5" fill="#111"/>
  <rect x="23" y="3" width="6" height="8" rx="0.5" fill="#111"/>
  <rect x="3" y="13" width="6" height="6" rx="0.5" fill="#111"/>
  <rect x="23" y="13" width="6" height="6" rx="0.5" fill="#111"/>
  <rect x="3" y="21" width="6" height="8" rx="0.5" fill="#111"/>
  <rect x="11" y="21" width="10" height="8" rx="0.5" fill="#111"/>
  <rect x="23" y="21" width="6" height="8" rx="0.5" fill="#111"/>

  <!-- Glow halo -->
  <circle cx="16" cy="14" r="8" fill="#00e87a" opacity="0.10"/>

  <!-- Location pin -->
  <path d="M16 5.5 C12.41 5.5 9.5 8.41 9.5 12 C9.5 17 16 23 16 23 C16 23 22.5 17 22.5 12 C22.5 8.41 19.59 5.5 16 5.5 Z" fill="#00e87a"/>

  <!-- Pin inner circle (dark cutout) -->
  <circle cx="16" cy="12" r="3.6" fill="#0a0a0a"/>

  <!-- Checkmark -->
  <polyline points="13.4,12.1 15.3,14 19,10" fill="none" stroke="#00e87a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
