<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="5" fill="#060b14"/>

  <!-- Horizon glow -->
  <rect x="0" y="27" width="32" height="5" fill="#00e87a" opacity="0.12"/>

  <!-- City skyline -->
  <g filter="url(#glow)" fill="#00e87a">
    <!-- Far-left small -->
    <rect x="1"  y="24" width="3" height="8"/>
    <!-- Step up -->
    <rect x="5"  y="20" width="2" height="12"/>
    <!-- Mid-left -->
    <rect x="8"  y="17" width="3" height="15"/>
    <!-- Tallest tower, left-center -->
    <rect x="12" y="8"  width="4" height="24"/>
    <!-- Antenna on tower -->
    <line x1="14" y1="8" x2="14" y2="4" stroke="#00e87a" stroke-width="1.2"/>
    <!-- Center building -->
    <rect x="17" y="13" width="3" height="19"/>
    <!-- Step down right -->
    <rect x="21" y="18" width="3" height="14"/>
    <rect x="25" y="21" width="2" height="11"/>
    <!-- Far-right small -->
    <rect x="28" y="23" width="3" height="9"/>
  </g>

  <!-- Red beacon on antenna -->
  <circle cx="14" cy="3.5" r="1.3" fill="#ff3b3b" opacity="0.95"/>

  <!-- Window cutouts on tallest tower -->
  <rect x="12.8" y="10"  width="1.2" height="1.2" fill="#060b14" opacity="0.8"/>
  <rect x="14.8" y="10"  width="1.2" height="1.2" fill="#060b14" opacity="0.8"/>
  <rect x="12.8" y="13"  width="1.2" height="1.2" fill="#060b14" opacity="0.8"/>
  <rect x="14.8" y="13"  width="1.2" height="1.2" fill="#060b14" opacity="0.8"/>
  <!-- Window on center building -->
  <rect x="17.8" y="15"  width="1.2" height="1.2" fill="#060b14" opacity="0.8"/>
  <rect x="17.8" y="18"  width="1.2" height="1.2" fill="#060b14" opacity="0.8"/>
</svg>
