<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Reusable C shape -->
    <path id="c" d="M 26.39 10 A 12 12 0 1 0 26.39 22 L 19.61 22 A 7 7 0 1 1 19.61 10 Z"/>
    <!-- Horizontal glitch band clip regions -->
    <clipPath id="g1"><rect x="0" y="5"    width="32" height="2"/></clipPath>
    <clipPath id="g2"><rect x="0" y="9"    width="32" height="1.5"/></clipPath>
    <clipPath id="g3"><rect x="0" y="13"   width="32" height="2.5"/></clipPath>
    <clipPath id="g4"><rect x="0" y="17"   width="32" height="1"/></clipPath>
    <clipPath id="g5"><rect x="0" y="20"   width="32" height="2"/></clipPath>
    <clipPath id="g6"><rect x="0" y="24"   width="32" height="1.5"/></clipPath>
  </defs>

  <!-- Black background -->
  <rect width="32" height="32" fill="#000"/>

  <!-- Base C in white -->
  <use href="#c" fill="#fff"/>

  <!-- Glitch bands: C redrawn in color with horizontal offset -->
  <use href="#c" fill="#ff003c" clip-path="url(#g1)" transform="translate(3,0)" opacity="0.95"/>
  <use href="#c" fill="#00fff0" clip-path="url(#g2)" transform="translate(-2,0)" opacity="0.9"/>
  <use href="#c" fill="#ffee00" clip-path="url(#g3)" transform="translate(2,0)"  opacity="0.95"/>
  <use href="#c" fill="#ff00ff" clip-path="url(#g4)" transform="translate(-3,0)" opacity="0.85"/>
  <use href="#c" fill="#00ff88" clip-path="url(#g5)" transform="translate(2,0)"  opacity="0.9"/>
  <use href="#c" fill="#0099ff" clip-path="url(#g6)" transform="translate(-2,0)" opacity="0.9"/>

  <!-- Extra stray glitch bars (pure color, no C clipping) -->
  <rect x="4"  y="13.5" width="10" height="0.8" fill="#ff003c" opacity="0.5"/>
  <rect x="10" y="20"   width="7"  height="0.6" fill="#00fff0" opacity="0.45"/>
  <rect x="3"  y="17"   width="5"  height="0.7" fill="#ffee00" opacity="0.4"/>
</svg>
